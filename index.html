<script>

const ADMIN_PWD = '2211';
const GIST_ID = "4e1306ea43693059737c4d2434c4f518";
const FILE_NAME = "team.json";

const COLORS = [
{bg:'#e8f0ff',cl:'#3355bb'},
{bg:'#fff0e8',cl:'#bb5522'},
{bg:'#f0e8ff',cl:'#7733bb'},
{bg:'#e8fff4',cl:'#226644'},
{bg:'#fff8e0',cl:'#886600'},
{bg:'#ffe8f4',cl:'#bb3377'},
{bg:'#e8faff',cl:'#226688'},
];

let people = [];
let isAdmin = false;
let lastSnapshot = '';

function initials(n){
return n.slice(0,2).toUpperCase();
}

async function loadFromServer(){
try{

const r = await fetch(`https://api.github.com/gists/${GIST_ID}`);
const d = await r.json();

if(!d.files || !d.files[FILE_NAME]) return;

const file = JSON.parse(d.files[FILE_NAME].content);

people = file.people;

}catch(e){
console.log("Load error",e);
}
}

function render(){

const snapshot = JSON.stringify(people);

if(snapshot === lastSnapshot) return;

lastSnapshot = snapshot;

const list = document.getElementById('list');
list.innerHTML = '';

people.forEach((p,i)=>{

const c = COLORS[i % COLORS.length];

const card = document.createElement('div');

card.className = 'card ' + (p.busy ? 'is-busy':'is-free');

card.innerHTML = `

<div class="avatar" style="background:${c.bg};color:${c.cl}">
${initials(p.name)}
</div>

<span class="person-name">${p.name}</span>

<div class="toggle-area">

<span class="status-text ${p.busy?'busy':'free'}">
${p.busy?'Занят':'Свободен'}
</span>

<label class="toggle">
<input type="checkbox" ${p.busy?'checked':''} onchange="toggle(${i},this.checked)">
<div class="track"></div>
<div class="thumb"></div>
</label>

</div>

<button class="del-btn" onclick="removePerson(${i})">×</button>

`;

list.appendChild(card);

});

const busy = people.filter(p=>p.busy).length;

document.getElementById('cAll').textContent = people.length;
document.getElementById('cBusy').textContent = busy;
document.getElementById('cFree').textContent = people.length - busy;

}

function toggle(i,checked){

people[i].busy = checked;

lastSnapshot='';

render();

}

function addPerson(){

const inp=document.getElementById('newName');
const name=inp.value.trim();

if(!name) return;

people.push({name,busy:false});

inp.value='';

lastSnapshot='';

render();

}

function removePerson(i){

people.splice(i,1);

lastSnapshot='';

render();

}

async function syncLoop(){

const prev = JSON.stringify(people);

await loadFromServer();

if(prev !== JSON.stringify(people)){
lastSnapshot='';
render();
}

}

function handleAdminClick(){

if(isAdmin){
exitAdmin();
return;
}

document.getElementById('overlay').classList.add('show');

setTimeout(()=>document.getElementById('pwdInput').focus(),50);

}

function checkPwd(){

if(document.getElementById('pwdInput').value===ADMIN_PWD){

isAdmin=true;

document.body.classList.add('admin-mode');

document.getElementById('adminBtn').textContent='Выйти';

document.getElementById('adminBtn').classList.add('active');

closeModal();

}else{

const inp=document.getElementById('pwdInput');

inp.classList.remove('shake');
void inp.offsetWidth;
inp.classList.add('shake');

document.getElementById('pwdErr').textContent='Неверный пароль';

inp.value='';

}

}

function exitAdmin(){

isAdmin=false;

document.body.classList.remove('admin-mode');

document.getElementById('adminBtn').textContent='Управление';

document.getElementById('adminBtn').classList.remove('active');

}

function closeModal(){

document.getElementById('overlay').classList.remove('show');

document.getElementById('pwdInput').value='';
document.getElementById('pwdErr').textContent='';

}

document.getElementById('pwdInput').addEventListener('keydown',e=>{
if(e.key==='Enter') checkPwd();
if(e.key==='Escape') closeModal();
document.getElementById('pwdErr').textContent='';
});

document.getElementById('overlay').addEventListener('click',e=>{
if(e.target===document.getElementById('overlay')) closeModal();
});

document.getElementById('newName').addEventListener('keydown',e=>{
if(e.key==='Enter') addPerson();
});

(async()=>{

await loadFromServer();

render();

setInterval(syncLoop,1000);

})();

</script>
